<?xml version="1.0" encoding="UTF-8"?>
<!--
  Social preview banner — "Física dos Semicondutores"
  Tamanho: 640x320 (proporção 2:1, ideal para Open Graph)
  Elementos visuais que sintetizam o projeto:
    1. Background com gradient oficial (slate → blue → emerald)
    2. Diagrama estilizado de bandas (BV e BC separadas por gap Eg)
    3. Elétrons na BC e lacunas na BV
    4. Curva de Fermi-Dirac sobreposta (transparente)
    5. Estrutura cristalina decorativa (rede de pontos)
    6. Título e identidade
-->
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320"
     viewBox="0 0 640 320" font-family="'Inter','Segoe UI',Roboto,system-ui,sans-serif">

  <!-- ============= DEFS: gradientes e padrões ============= -->
  <defs>
    <!-- Gradiente principal de fundo (cores oficiais do projeto) -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <!-- Overlay escuro sutil para legibilidade -->
    <linearGradient id="overlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#0b1120" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#0b1120" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Banda de Condução: gradient verde-ciano -->
    <linearGradient id="cbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Banda de Valência: gradient azul -->
    <linearGradient id="vbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Sombra do texto principal -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.7"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow para elétrons -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Padrão de rede cristalina decorativa -->
    <pattern id="lattice" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#ffffff" fill-opacity="0.10"/>
      <line x1="0" y1="12" x2="24" y2="12" stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5"/>
      <line x1="12" y1="0" x2="12" y2="24" stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- ============= BACKGROUND ============= -->
  <rect width="640" height="320" fill="url(#bgGrad)"/>
  <rect width="640" height="320" fill="url(#lattice)"/>
  <rect width="640" height="320" fill="url(#overlay)"/>

  <!-- ============= COLUNA DIREITA: Diagrama de bandas ============= -->
  <!-- Área do diagrama: x ∈ [340, 610], y ∈ [50, 270] -->
  <g transform="translate(340, 50)">

    <!-- Eixo de energia E -->
    <line x1="10" y1="0" x2="10" y2="220" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.2"/>
    <polygon points="10,0 6,10 14,10" fill="#ffffff" fill-opacity="0.55"/>
    <text x="22" y="10" font-size="11" fill="#ffffff" fill-opacity="0.7" font-style="italic">E</text>

    <!-- Banda de Condução (BC) -->
    <rect x="20" y="20" width="240" height="55" rx="3" fill="url(#cbGrad)"/>
    <text x="30" y="40" font-size="11" font-weight="700" fill="#ecfeff">BC</text>
    <text x="30" y="55" font-size="9" fill="#a5f3fc" fill-opacity="0.85">Conduction Band</text>
    <line x1="20" y1="75" x2="260" y2="75" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="265" y="79" font-size="10" fill="#22d3ee" font-weight="600">E_c</text>

    <!-- Gap proibido com indicação E_g -->
    <line x1="100" y1="75" x2="100" y2="135" stroke="#fbbf24" stroke-width="1.5"/>
    <polygon points="100,75 96,82 104,82" fill="#fbbf24"/>
    <polygon points="100,135 96,128 104,128" fill="#fbbf24"/>
    <rect x="84" y="98" width="32" height="14" rx="3" fill="#0b1120" stroke="#fbbf24" stroke-width="0.8"/>
    <text x="100" y="108" font-size="10" fill="#fbbf24" font-weight="700"
          text-anchor="middle">E_g</text>

    <!-- Linha de Fermi (E_F) tracejada -->
    <line x1="20" y1="105" x2="260" y2="105" stroke="#f472b6" stroke-width="1.2" stroke-dasharray="5 3"/>
    <text x="265" y="109" font-size="10" fill="#f472b6" font-weight="600">E_F</text>

    <!-- Banda de Valência (BV) -->
    <line x1="20" y1="135" x2="260" y2="135" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="265" y="139" font-size="10" fill="#60a5fa" font-weight="600">E_v</text>
    <rect x="20" y="135" width="240" height="55" rx="3" fill="url(#vbGrad)"/>
    <text x="30" y="160" font-size="11" font-weight="700" fill="#dbeafe">BV</text>
    <text x="30" y="174" font-size="9" fill="#bfdbfe" fill-opacity="0.85">Valence Band</text>

    <!-- Eixo k (horizontal) -->
    <line x1="10" y1="220" x2="270" y2="220" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.2"/>
    <polygon points="270,220 260,216 260,224" fill="#ffffff" fill-opacity="0.55"/>
    <text x="252" y="215" font-size="11" fill="#ffffff" fill-opacity="0.7" font-style="italic">k</text>

    <!-- Elétrons na BC (círculos amarelos com glow) -->
    <g filter="url(#glow)">
      <circle cx="60"  cy="50" r="4" fill="#fde047"/>
      <circle cx="110" cy="42" r="4" fill="#fde047"/>
      <circle cx="170" cy="55" r="4" fill="#fde047"/>
      <circle cx="220" cy="48" r="4" fill="#fde047"/>
      <circle cx="140" cy="60" r="3.5" fill="#fde047"/>
    </g>
    <!-- Sinal "−" nos elétrons centrais -->
    <text x="60"  y="53" font-size="7" font-weight="900" fill="#92400e" text-anchor="middle">−</text>
    <text x="110" y="45" font-size="7" font-weight="900" fill="#92400e" text-anchor="middle">−</text>
    <text x="170" y="58" font-size="7" font-weight="900" fill="#92400e" text-anchor="middle">−</text>
    <text x="220" y="51" font-size="7" font-weight="900" fill="#92400e" text-anchor="middle">−</text>

    <!-- Lacunas na BV (círculos vazados) -->
    <g>
      <circle cx="50"  cy="170" r="4" fill="none" stroke="#fca5a5" stroke-width="1.5"/>
      <circle cx="100" cy="178" r="4" fill="none" stroke="#fca5a5" stroke-width="1.5"/>
      <circle cx="160" cy="172" r="4" fill="none" stroke="#fca5a5" stroke-width="1.5"/>
      <circle cx="210" cy="180" r="4" fill="none" stroke="#fca5a5" stroke-width="1.5"/>
      <text x="50"  y="173" font-size="7" font-weight="900" fill="#fca5a5" text-anchor="middle">+</text>
      <text x="100" y="181" font-size="7" font-weight="900" fill="#fca5a5" text-anchor="middle">+</text>
      <text x="160" y="175" font-size="7" font-weight="900" fill="#fca5a5" text-anchor="middle">+</text>
      <text x="210" y="183" font-size="7" font-weight="900" fill="#fca5a5" text-anchor="middle">+</text>
    </g>

    <!-- Seta de geração e-h (transição banda-banda) -->
    <line x1="190" y1="170" x2="190" y2="60" stroke="#fbbf24" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
    <polygon points="190,60 187,67 193,67" fill="#fbbf24" opacity="0.7"/>

    <!-- Curva de Fermi-Dirac sobreposta sutil (à direita) -->
    <g transform="translate(0,0)" opacity="0.5">
      <path d="M 18,30 Q 60,30 100,75 Q 130,105 160,180 Q 190,210 260,210"
            fill="none" stroke="#f472b6" stroke-width="1.5"/>
    </g>

  </g>

  <!-- ============= COLUNA ESQUERDA: Tipografia ============= -->
  <g transform="translate(32, 60)" filter="url(#textShadow)">

    <!-- Pequeno selo superior -->
    <rect x="0" y="0" width="98" height="20" rx="10" fill="#22d3ee" fill-opacity="0.18"
          stroke="#22d3ee" stroke-width="1"/>
    <text x="49" y="14" font-size="10" font-weight="600" fill="#a5f3fc"
          text-anchor="middle" letter-spacing="0.5">SIMULADOR INTERATIVO</text>

    <!-- Título principal -->
    <text x="0" y="60" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="-0.5">
      Física dos
    </text>
    <text x="0" y="98" font-size="34" font-weight="800" fill="#22d3ee" letter-spacing="-0.5">
      Semicondutores
    </text>

    <!-- Subtítulo -->
    <text x="0" y="128" font-size="13" font-weight="500" fill="#cbd5e1" letter-spacing="0.2">
      Bandas · Kronig-Penney · Fermi-Dirac
    </text>
    <text x="0" y="146" font-size="13" font-weight="500" fill="#cbd5e1" letter-spacing="0.2">
      Massa Efetiva · DOS · n(T) Arrhenius
    </text>

    <!-- Pequenas fórmulas decorativas -->
    <g font-family="'Cambria Math','Latin Modern Math','STIX Two Math',Georgia,serif"
       font-style="italic" font-size="13" fill="#86efac">
      <text x="0" y="178">f(E) = 1 / (1 + exp[(E−E_F)/kT])</text>
    </g>
    <g font-family="'Cambria Math','Latin Modern Math','STIX Two Math',Georgia,serif"
       font-style="italic" font-size="13" fill="#fde68a">
      <text x="0" y="198">n_i² = N_c N_v exp(−E_g / kT)</text>
    </g>

    <!-- Rodapé: URL do projeto -->
    <g transform="translate(0, 220)">
      <!-- ícone GitHub estilizado -->
      <circle cx="9" cy="9" r="9" fill="#ffffff" fill-opacity="0.12"/>
      <path d="M9 3.2 C5.8 3.2 3.2 5.8 3.2 9 c0 2.55 1.65 4.7 3.93 5.46 c0.29 0.05 0.4-0.13 0.4-0.28 v-0.99 c-1.6 0.35-1.94-0.77-1.94-0.77 c-0.26-0.66-0.64-0.84-0.64-0.84 c-0.52-0.36 0.04-0.35 0.04-0.35 c0.58 0.04 0.88 0.59 0.88 0.59 c0.51 0.88 1.34 0.62 1.67 0.48 c0.05-0.37 0.20-0.62 0.36-0.77 c-1.27-0.14-2.62-0.64-2.62-2.84 c0-0.63 0.22-1.14 0.59-1.55 c-0.06-0.14-0.26-0.73 0.06-1.52 c0 0 0.48-0.15 1.57 0.59 c0.46-0.13 0.95-0.19 1.43-0.19 c0.49 0 0.97 0.07 1.43 0.19 c1.09-0.74 1.57-0.59 1.57-0.59 c0.31 0.79 0.11 1.38 0.06 1.52 c0.37 0.41 0.59 0.92 0.59 1.55 c0 2.21-1.34 2.70-2.63 2.84 c0.21 0.18 0.39 0.53 0.39 1.07 v1.58 c0 0.16 0.10 0.33 0.40 0.28 c2.27-0.76 3.93-2.91 3.93-5.46 c0-3.18-2.6-5.8-5.8-5.8 z"
            fill="#ffffff" fill-opacity="0.85"/>
      <text x="24" y="13" font-size="11" font-weight="500" fill="#e2e8f0" letter-spacing="0.3">
        github.com/carlosdelfino/fisica-dos-semicondutores
      </text>
    </g>

  </g>

  <!-- ============= MOLDURA DECORATIVA ============= -->
  <rect x="0.5" y="0.5" width="639" height="319" fill="none"
        stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Faixa de acento na borda esquerda -->
  <rect x="0" y="0" width="4" height="320" fill="#22d3ee"/>

</svg>
