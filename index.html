    <style>
      /* Tarja "Colabore no GitHub" — fork-me ribbon */
      .gh-ribbon {
        position: fixed;
        top: 0;
        right: 0;
        width: 220px;
        height: 220px;
        overflow: hidden;
        z-index: 9999;
        pointer-events: none;
      }
      .gh-ribbon a {
        position: absolute;
        top: 38px;
        right: -62px;
        width: 260px;
        padding: 10px 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: linear-gradient(135deg, #10b981 0%, #1a56db 50%, #0f172a 100%);
        color: #fff;
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.4px;
        text-decoration: none;
        text-align: center;
        transform: rotate(45deg);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45),
                    inset 0 0 0 1px rgba(255, 255, 255, 0.18);
        border-top: 1px solid rgba(255, 255, 255, 0.25);
        border-bottom: 1px solid rgba(0, 0, 0, 0.35);
        pointer-events: auto;
        transition: filter 0.2s ease, transform 0.2s ease;
      }
      .gh-ribbon a:hover {
        filter: brightness(1.15) saturate(1.1);
      }
      .gh-ribbon a:active {
        filter: brightness(0.95);
      }
      .gh-ribbon svg {
        width: 16px;
        height: 16px;
        fill: #ffffff;
        flex-shrink: 0;
      }
      /* Discreto pulse no carregamento, depois acomoda */
      @keyframes gh-ribbon-attention {
        0%, 100% { box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45),
                                inset 0 0 0 1px rgba(255, 255, 255, 0.18); }
        50%      { box-shadow: 0 4px 22px rgba(34, 211, 238, 0.55),
                                inset 0 0 0 1px rgba(255, 255, 255, 0.30); }
      }
      .gh-ribbon a {
        animation: gh-ribbon-attention 2.6s ease-in-out 2;
      }
      /* Em telas pequenas, encolher para não competir com o conteúdo */
      @media (max-width: 640px) {
        .gh-ribbon { width: 160px; height: 160px; }
        .gh-ribbon a {
          top: 28px;
          right: -68px;
          width: 230px;
          font-size: 11px;
          padding: 8px 0;
        }
        .gh-ribbon svg { width: 13px; height: 13px; }
      }
    </style>
