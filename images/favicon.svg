<?xml version="1.0" encoding="UTF-8"?>
<!--
  Favicon — "Física dos Semicondutores"
  Tamanho: 32x32 (padrão para favicon SVG)
  Ícone simplificado representando bandas de energia
-->
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"
     viewBox="0 0 32 32" font-family="'Inter','Segoe UI',Roboto,system-ui,sans-serif">

  <!-- Gradiente de fundo (cores oficiais do projeto) -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bgGrad)"/>

  <!-- Diagrama de bandas simplificado -->
  <g transform="translate(6, 6)">
    <!-- Banda de Condução (BC) -->
    <rect x="2" y="2" width="18" height="5" rx="1" fill="#22d3ee" fill-opacity="0.9"/>
    <line x1="2" y1="7" x2="20" y2="7" stroke="#22d3ee" stroke-width="1"/>

    <!-- Gap proibido -->
    <line x1="8" y1="7" x2="8" y2="12" stroke="#fbbf24" stroke-width="0.8"/>
    <polygon points="8,7 6,9 10,9" fill="#fbbf24"/>
    <polygon points="8,12 6,10 10,10" fill="#fbbf24"/>

    <!-- Banda de Valência (BV) -->
    <line x1="2" y1="12" x2="20" y2="12" stroke="#3b82f6" stroke-width="1"/>
    <rect x="2" y="12" width="18" height="5" rx="1" fill="#3b82f6" fill-opacity="0.9"/>

    <!-- Elétron na BC -->
    <circle cx="12" cy="4.5" r="1.5" fill="#fde047"/>

    <!-- Lacuna na BV -->
    <circle cx="12" cy="14.5" r="1.5" fill="none" stroke="#fca5a5" stroke-width="0.8"/>
  </g>

</svg>
