name: Build & Deploy to site branch

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Permite que o GITHUB_TOKEN faça push no repositório
permissions:
  contents: write

concurrency:
  group: deploy-site-branch
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build Vite project and publish to site branch
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Checkout do código fonte
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🏗️ Executar build (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: ✅ Verificar saída do build
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Diretório dist/ não foi gerado pelo build."
            exit 1
          fi
          echo "ℹ️ Conteúdo gerado em dist/:"
          ls -la dist
          # Garante que o GitHub Pages não trate o site como Jekyll
          touch dist/.nojekyll

      - name: 🏁 Publicar no branch site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: site
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: |
            🚀 Deploy site build de ${{ github.sha }}

            Workflow: ${{ github.workflow }}
            Run: ${{ github.run_id }}
            Origem: ${{ github.ref_name }}
